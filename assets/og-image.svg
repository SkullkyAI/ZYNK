  <!-- Footer -->
  <text x="80" y="614" font-family="Courier New, monospace" font-size="11" fill="#6B7280" letter-spacing="2">CON EL APOYO DE</text>
  <text x="240" y="614" font-family="Courier New, monospace" font-size="11" fill="#4B5563" letter-spacing="2">·  TALENTUM PROGRAM  ·  PRINCIPIOS</text>

