<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="15%" cy="85%" r="65%">
      <stop offset="0%" stop-color="#B6FF47" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#080A0C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B6FF47"/>
      <stop offset="100%" stop-color="#080A0C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080A0C"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="80" y="0" width="260" height="2" fill="#B6FF47"/>

  <!-- ZYNK -->
  <text x="80" y="96" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="#B6FF47" letter-spacing="10">ZYNK</text>

  <!-- Meta line -->
  <text x="80" y="136" font-family="Courier New, monospace" font-size="11" fill="#6B7280" letter-spacing="3">NOTA TÉCNICA · 2026 · POLÍTICA DE VIVIENDA · ESPAÑA</text>

  <!-- Divider -->
  <rect x="80" y="162" width="400" height="1" fill="#1a1f24"/>

  <!-- Main title -->
  <text x="80" y="268" font-family="Arial Black, Arial, sans-serif" font-size="78" font-weight="900" fill="#F0F2F0" letter-spacing="-2">La generación</text>
  <text x="80" y="364" font-family="Arial Black, Arial, sans-serif" font-size="78" font-weight="900" letter-spacing="-2">
    <tspan fill="#F0F2F0">sin </tspan><tspan fill="#B6FF47">vivienda</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="418" font-family="Arial, sans-serif" font-size="18" fill="#6B7280">Diagnóstico, fallos estructurales y propuestas para ampliar el acceso juvenil</text>
